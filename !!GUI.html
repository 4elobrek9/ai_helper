<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Helper - Living Shard GUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --primary-glow: 0 0 20px rgba(0, 255, 255, 0.6);
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #0f0f13;
            /* Abstract background representing a user's desktop wallpaper */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.3) 0%, transparent 40%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Core Widget Wrapper */
        .widget-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Central Core (AI Brain) */
        .core {
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%; /* Circle shape initially */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        /* Pulse animation for the core */
        .core::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid cyan;
            opacity: 0;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .core:hover {
            transform: scale(1.1);
            box-shadow: var(--primary-glow);
            border-color: cyan;
        }

        /* The Satellites (Menu Items) */
        .satellite {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(30, 30, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: scale(0) translate(0, 0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1;
        }

        .satellite:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: cyan;
            box-shadow: 0 0 15px cyan;
            z-index: 20;
        }

        /* Active State - Satellites Expand */
        .widget-container.active .satellite:nth-child(2) { /* Top - Chat */
            transform: translateY(-90px) scale(1);
            opacity: 1;
        }
        .widget-container.active .satellite:nth-child(3) { /* Right - Tools */
            transform: translateX(90px) scale(1);
            opacity: 1;
        }
        .widget-container.active .satellite:nth-child(4) { /* Bottom - Mic */
            transform: translateY(90px) scale(1);
            opacity: 1;
        }
        .widget-container.active .satellite:nth-child(5) { /* Left - Settings */
            transform: translateX(-90px) scale(1);
            opacity: 1;
        }

        /* Tooltips */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid cyan;
            color: cyan;
            font-family: 'Orbitron', sans-serif;
        }

        .satellite:nth-child(2) .tooltip { top: -30px; }
        .satellite:nth-child(3) .tooltip { left: 70px; }
        .satellite:nth-child(4) .tooltip { bottom: -30px; }
        .satellite:nth-child(5) .tooltip { right: 70px; }

        .satellite:hover .tooltip { opacity: 1; }

        /* Chat Panel (Example of expansion) */
        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 300px;
            height: 400px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            z-index: 5;
            transition: 0.4s ease;
            opacity: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Ignore clicks when hidden */
        }

        .panel.open {
            transform: translate(-50%, -120%) scale(1); /* Moves up above core */
            opacity: 1;
            pointer-events: all;
        }

        .chat-line {
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }

        /* Instruction Text */
        .instruction {
            position: absolute;
            bottom: 50px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            animation: fadeIn 3s infinite alternate;
        }
        
        @keyframes fadeIn {
            from { opacity: 0.2; }
            to { opacity: 0.6; }
        }

    </style>
</head>
<body>

    <div class="instruction">Нажми на Ядро</div>

    <div class="widget-container" id="widget">
        <!-- The Core (Main Button) -->
        <div class="core" onclick="toggleMenu()">
            <i class="fas fa-fingerprint text-3xl text-cyan-400"></i>
        </div>

        <!-- Satellite: Chat (Top) -->
        <div class="satellite" onclick="togglePanel('chat')">
            <i class="fas fa-comment-dots"></i>
            <div class="tooltip">НЕЙРО-ЧАТ</div>
        </div>

        <!-- Satellite: Tools (Right) -->
        <div class="satellite">
            <i class="fas fa-magic"></i>
            <div class="tooltip">СКРИПТЫ</div>
        </div>

        <!-- Satellite: Voice (Bottom) -->
        <div class="satellite">
            <i class="fas fa-microphone"></i>
            <div class="tooltip">ГОЛОС</div>
        </div>

        <!-- Satellite: Settings (Left) -->
        <div class="satellite">
            <i class="fas fa-sliders-h"></i>
            <div class="tooltip">КОНФИГ</div>
        </div>

        <!-- Expanding Chat Panel Example -->
        <div class="panel" id="chatPanel">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                <span class="text-cyan-400 font-bold font-orbitron">AI HELPER LOG</span>
                <i class="fas fa-times cursor-pointer hover:text-red-400" onclick="togglePanel('chat')"></i>
            </div>
            <div class="flex-1 overflow-auto">
                <div class="chat-line text-cyan-300">System: Ядро активно.</div>
                <div class="chat-line">User: Запусти дизайн GUI.</div>
                <div class="chat-line text-cyan-300">AI: Загружаю модули интерфейса...</div>
            </div>
            <div class="mt-2 flex gap-2">
                <input type="text" placeholder="Введите команду..." class="w-full bg-transparent border border-gray-600 rounded px-2 py-1 text-white focus:border-cyan-400 outline-none">
                <button class="text-cyan-400"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const widget = document.getElementById('widget');
        const chatPanel = document.getElementById('chatPanel');

        function toggleMenu() {
            // Toggle the expansion of satellites
            widget.classList.toggle('active');
            
            // If we close the menu, close panels too
            if (!widget.classList.contains('active')) {
                chatPanel.classList.remove('open');
            }
        }

        function togglePanel(type) {
            if(type === 'chat') {
                chatPanel.classList.toggle('open');
            }
        }
    </script>
</body>
</html>
